# Enable experimental features (currently not using any specific early_access features)
early_access: true

inheritance: true

chat:
  # CodeRabbit will automatically respond to @coderabbitai mentions in PR comments
  auto_reply: true

reviews:
  auto_review:
    # Automatically trigger reviews when PRs are opened or updated
    enabled: true
    # Don't auto-review draft PRs
    drafts: false
    # Only auto-review PRs targeting these branches
    base_branches:
      - main
      - develop

  # Include a high-level summary at the start of each review
  high_level_summary: true

  # Generate sequence diagrams for complex code flows
  sequence_diagrams: true

  # Don't include poems in reviews (fun feature, but keeping it professional)
  poem: false

  # Show review completion status
  review_status: true

  # Keep the walkthrough section expanded by default
  collapse_walkthrough: false

  # Include summary of all changed files
  changed_files_summary: true

  # Request changes workflow: auto-approve once all CodeRabbit comments are resolved
  request_changes_workflow: true

  path_instructions:
    - path: "plugins/**"
      instructions: |
        **Plugin CHANGELOG**
        Any change to files under a plugin directory (plugins/<plugin-name>/) must be accompanied by an
        update to that plugin's CHANGELOG.md (plugins/<plugin-name>/CHANGELOG.md). Verify CHANGELOG.md
        has a new or updated entry reflecting the changes. Flag if it is missing or unchanged.

        **Marketplace version**
        For large refactorings or structural changes to non-plugin data in marketplace.json (e.g. root-level
        fields like "version", "name", "description", "owner", "repository", "homepage", "strict"), verify
        that the root "version" field in marketplace.json has been incremented. Minor plugin-entry changes
        (adding/updating a plugin) do not require a marketplace version bump. Flag if a significant
        structural change was made without incrementing the root version.

        **README.md**
        If a plugin is added, removed, or renamed, or if a skill's commands or functionality change
        significantly, README.md must be updated to reflect those changes. Flag if README.md appears
        outdated relative to the plugin changes in the PR.
